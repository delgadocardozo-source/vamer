<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script>
        (function () {
            var p = location.pathname;
            var basePath = /\.[^./]+$/i.test(p) ? p.replace(/[^/]+$/, "") : (p.endsWith("/") ? p : p + "/");
            var b = document.createElement("base");
            b.href = basePath;
            var first = document.head.firstElementChild;
            if (first) document.head.insertBefore(b, first.nextSibling);
            else document.head.appendChild(b);
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAMER</title>
    <meta http-equiv="refresh" content="0; url=vamer.html">
    <script>location.replace("vamer.html");</script>
</head>
<body class="font-sans p-8 text-slate-600">
    <p>Si no redirige solo, <a href="vamer.html" class="text-blue-800 font-semibold underline">entra al sitio VAMER</a>.</p>
</body>
</html>
